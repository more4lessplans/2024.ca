<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | More4Less Wireless</title>

    <!-- 5. Favicons & Theme -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicons/favicon-16x16.png">
    <link rel="shortcut icon" href="assets/img/favicons/favicon.ico">
    <link rel="manifest" href="assets/img/favicons/site.webmanifest">
    <meta name="theme-color" content="#FFFFF">
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Primary Stylesheet -->
    <link rel="stylesheet" href="css/contact.css">
</head>
<body class="flow-body">

    <!-- Invisible Z-Index 10000 Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- High-End Minimalist Navigation -->
    <nav class="navbar-minimal">
        <a href="/" class="nav-brand-link">
            <img src="assets/img/logos/logo.png" alt="More4Less" class="nav-logo">
        </a>
        <a href="/" class="exit-flow" aria-label="Close and return to home">✕</a>
    </nav>

    <!-- The Centered Form Anchor -->
    <main class="flow-wrapper">
        <form 
            id="jotformFlow" 
            action="https://submit.jotform.com/submit/211765043197154/" 
            method="post" 
            autocomplete="off"
        >
            <input type="hidden" name="formID" value="211765043197154" />

            <!-- STEP 1: NAME -->
            <div class="form-step active" data-step="1">
                <span class="step-label">01 — Introduction</span>
                <h2>What should we call you?</h2>
                <div class="input-pair">
                    <input type="text" name="q28_name[first]" id="first_name" placeholder="First name" required autofocus>
                    <input type="text" name="q28_name[last]" id="last_name" placeholder="Last name" required>
                </div>
                <div class="step-nav">
                    <button type="button" class="btn-next">Continue</button>
                </div>
            </div>

            <!-- STEP 2: EMAIL -->
            <div class="form-step" data-step="2">
                <span class="step-label">02 — Contact Details</span>
                <h2>Nice to meet you. What’s your email?</h2>
                <input type="email" name="q2_email" id="input_email" placeholder="email@example.com" required>
                <div class="step-nav">
                    <button type="button" class="btn-next">Continue</button>
                    <button type="button" class="btn-back">Back</button>
                </div>
            </div>

            <!-- STEP 3: PHONE (OPTIONAL) -->
            <div class="form-step" data-step="3">
                <span class="step-label">03 — Accessibility</span>
                <h2>And a phone number to reach you?</h2>
                <input type="tel" name="q11_phone[full]" id="input_phone" placeholder="(555) 000-0000">
                <div class="step-nav">
                    <button type="button" class="btn-next">Continue</button>
                    <button type="button" class="btn-back">Back</button>
                </div>
            </div>

            <!-- STEP 4: MESSAGE -->
            <div class="form-step" data-step="4">
                <span class="step-label">04 — Inquiry</span>
                <h2>How can we help you today?</h2>
                <textarea name="q24_commentsQuestions" id="input_message" placeholder="Type your message here..." required></textarea>
                <div class="step-nav">
                    <button type="submit" class="btn-submit">Submit Request</button>
                    <button type="button" class="btn-back">Back</button>
                </div>
                <p class="submit-hint">Press <strong>Enter ↵</strong> to send your message</p>
            </div>
        </form>
    </main>

    <!-- Flow Logic Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('jotformFlow');
            const steps = Array.from(document.querySelectorAll('.form-step'));
            const nextBtns = document.querySelectorAll('.btn-next');
            const backBtns = document.querySelectorAll('.btn-back');
            const progressBar = document.getElementById('progressBar');

            /**
             * Updates the visual progress bar and shifts focus
             */
            function updateFlowUI(index) {
                // Progress Bar Math
                const progressPercentage = (index / (steps.length - 1)) * 100;
                progressBar.style.width = `${progressPercentage}%`;
                
                // Auto-Focus first input in new step for premium UX
                setTimeout(() => {
                    const firstInput = steps[index].querySelector('input, textarea');
                    if (firstInput) firstInput.focus();
                }, 600);
            }

            /**
             * Transition to Next Step
             */
            nextBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const currentStep = btn.closest('.form-step');
                    const requiredInputs = currentStep.querySelectorAll('[required]');
                    
                    let isStepValid = true;
                    requiredInputs.forEach(input => {
                        if (!input.value.trim()) {
                            isStepValid = false;
                            input.style.borderColor = "var(--brand-red)";
                            // Shake animation could be added here
                        } else {
                            input.style.borderColor = "";
                        }
                    });

                    if (isStepValid) {
                        currentStep.classList.remove('active');
                        currentStep.classList.add('exit');
                        
                        const nextStep = steps[steps.indexOf(currentStep) + 1];
                        if (nextStep) {
                            nextStep.classList.add('active');
                            updateFlowUI(steps.indexOf(nextStep));
                        }
                    }
                });
            });

            /**
             * Transition to Previous Step
             */
            backBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const currentStep = btn.closest('.form-step');
                    currentStep.classList.remove('active');
                    
                    const prevStep = steps[steps.indexOf(currentStep) - 1];
                    if (prevStep) {
                        prevStep.classList.remove('exit');
                        prevStep.classList.add('active');
                        updateFlowUI(steps.indexOf(prevStep));
                    }
                });
            });

            /**
             * Keyboard Accessibility: Enter Key Logic
             */
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    // Prevent form submission if we aren't on the final step
                    const activeStep = document.querySelector('.form-step.active');
                    const isLastStep = steps.indexOf(activeStep) === steps.length - 1;
                    
                    if (!isLastStep) {
                        e.preventDefault();
                        const nextBtn = activeStep.querySelector('.btn-next');
                        if (nextBtn) nextBtn.click();
                    }
                }
            });

            // Set initial progress
            updateFlowUI(0);
        });
    </script>
</body>
</html>
