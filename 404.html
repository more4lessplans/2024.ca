<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | More4Less</title>

    <!-- 5. Favicons & Theme -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicons/favicon-16x16.png">
    <link rel="shortcut icon" href="assets/img/favicons/favicon.ico">
    <link rel="manifest" href="assets/img/favicons/site.webmanifest">
    <meta name="theme-color" content="#2E2F33">

    <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-red:   #D73C59;
            --bg-nav:      #2E2F33;
            --bg-page:     #FBFBFD;
            --text-dark:   #1d1d1f;
            --text-muted:  #6e6e73;
            --nav-h:       68px;
            --border:      #eaeaec;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 15px;
            scroll-behavior: smooth;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Figtree', sans-serif;
            background: var(--bg-page);
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* ─── NAVBAR ─────────────────────────────────────────────── */
        .navbar-custom {
            background-color: var(--bg-nav);
            padding: 1.2rem 0;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 4000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 25px;
        }

        .navbar-brand img { height: 22px; }

        .nav-links-desktop {
            display: flex;
            align-items: center;
            list-style: none;
        }

        .nav-links-desktop li a {
            color: #ffffff;
            font-weight: 500;
            font-size: 0.85rem;
            margin: 0 18px;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.2s;
            position: relative;
        }

        .nav-links-desktop li a:hover { opacity: 1; }

        .nav-links-desktop li a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: var(--brand-red);
            transition: width 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .nav-links-desktop li a:hover::after { width: 100%; }

        .btn-portal-top::after { display: none !important; }

        .btn-portal-top {
            background: var(--brand-red);
            color: white !important;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 600;
            opacity: 1 !important;
            transition: all 0.3s ease !important;
        }

        .btn-portal-top:hover {
            background: #ffffff !important;
            color: var(--text-dark) !important;
            transform: translateY(-2px);
        }

        .menu-trigger {
            display: none;
            cursor: pointer;
            padding: 10px;
            z-index: 5001;
            position: relative;
        }

        .menu-icon {
            width: 26px;
            height: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-icon span {
            display: block;
            width: 100%;
            height: 2px;
            background: #fff;
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-active .menu-icon span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-active .menu-icon span:nth-child(2) { opacity: 0; transform: translateX(10px); }
        .menu-active .menu-icon span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .mobile-overlay {
            position: fixed;
            inset: 0;
            background: rgba(29, 29, 31, 0.98);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 4500;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .mobile-overlay.active { opacity: 1; visibility: visible; }

        .mobile-nav-links { list-style: none; padding: 0; text-align: center; }

        .mobile-nav-links li {
            margin: 25px 0;
            transform: translateY(20px);
            opacity: 0;
            transition: 0.4s ease;
        }

        .mobile-overlay.active .mobile-nav-links li { transform: translateY(0); opacity: 1; }

        .mobile-nav-links li:nth-child(1) { transition-delay: 0.10s; }
        .mobile-nav-links li:nth-child(2) { transition-delay: 0.15s; }
        .mobile-nav-links li:nth-child(3) { transition-delay: 0.20s; }

        .mobile-nav-links a {
            color: #fff;
            font-size: 2.2rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: -0.03em;
            position: relative;
            display: inline-block;
        }

        .mobile-nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 3px;
            bottom: -4px;
            left: 0;
            background-color: var(--brand-red);
            transition: width 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }

        .mobile-nav-links a:hover::after { width: 100%; }

        /* ─── 404 CONTENT ────────────────────────────────────────── */
        .error-wrap {
            height: 100vh;
            padding-top: var(--nav-h);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle dot grid background */
        .error-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
            background-size: 28px 28px;
            opacity: 0.6;
            pointer-events: none;
        }

        .error-content {
            position: relative;
            z-index: 2;
            max-width: 580px;
            padding: 0 24px;
            opacity: 0;
            animation: fadeUp 0.8s ease 0.15s forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Large 404 number */
        .error-code {
            font-size: clamp(5rem, 15vw, 9rem);
            font-weight: 800;
            letter-spacing: -0.06em;
            line-height: 0.9;
            color: var(--text-dark);
            margin-bottom: 20px;
            position: relative;
            display: inline-block;
        }

        /* Red accent slash through the zero */
        .error-code::after {
            content: '';
            position: absolute;
            width: 3px;
            height: 120%;
            background: var(--brand-red);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(25deg);
            border-radius: 2px;
            opacity: 0.85;
        }

        .error-title {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--text-dark);
            margin-bottom: 12px;
        }

        .error-text {
            font-size: 1.05rem;
            color: var(--text-muted);
            line-height: 1.7;
            margin-bottom: 36px;
        }

        /* Action buttons */
        .error-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn-primary,
        .btn-secondary {
            display: inline-block;
            font-weight: 700;
            font-size: 0.9rem;
            padding: 14px 32px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: var(--brand-red);
            color: #ffffff;
            box-shadow: 0 8px 24px rgba(215, 60, 89, 0.28);
        }

        .btn-primary:hover {
            background: var(--text-dark);
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-dark);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--text-dark);
            transform: translateY(-2px);
        }

        /* ─── RESPONSIVE ─────────────────────────────────────────── */
        @media (max-width: 768px) {
            .nav-links-desktop { display: none; }
            .menu-trigger { display: block; }

            .error-code { font-size: 6rem; }
            .error-title { font-size: 1.4rem; }
            .error-text { font-size: 0.95rem; }

            .error-actions {
                flex-direction: column;
                gap: 10px;
            }

            .btn-primary,
            .btn-secondary {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

<!-- ── NAVBAR ─────────────────────────────────────────────────── -->
<nav class="navbar-custom">
    <div class="nav-container">
        <a class="navbar-brand" href="/">
            <img src="assets/img/logos/logo.png" alt="More4Less">
        </a>

        <ul class="nav-links-desktop">
            <li><a href="/#pricing">Pricing</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/portal" class="btn-portal-top">Customer Portal</a></li>
        </ul>

        <div class="menu-trigger" id="menuTrigger" onclick="toggleMenu()">
            <div class="menu-icon">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
</nav>

<div class="mobile-overlay" id="mobileOverlay">
    <ul class="mobile-nav-links">
        <li><a href="/#pricing">Pricing</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/portal">Account Portal</a></li>
    </ul>
</div>

<!-- ── ERROR CONTENT ──────────────────────────────────────────── -->
<div class="error-wrap">
    <div class="error-content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-text">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
     
    </div>
</div>

<script>
    function toggleMenu() {
        const trigger = document.getElementById('menuTrigger');
        const overlay = document.getElementById('mobileOverlay');
        const isOpen  = trigger.classList.contains('menu-active');
        trigger.classList.toggle('menu-active');
        overlay.classList.toggle('active');
        document.body.style.overflow = isOpen ? '' : 'hidden';
    }

    document.getElementById('mobileOverlay').addEventListener('click', function(e) {
        if (e.target === this) toggleMenu();
    });
</script>

</body>
</html>
